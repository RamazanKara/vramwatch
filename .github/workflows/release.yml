name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: build release artifacts
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist
          targets="linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64"
          for t in $targets; do
            os="${t%/*}"; arch="${t#*/}"
            bin="vramwatch"; [ "$os" = "windows" ] && bin="vramwatch.exe"
            echo "building $os/$arch"
            GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 \
              go build -ldflags "-s -w -X main.Version=${VERSION}" -o "$bin" ./cmd/vramwatch
            name="vramwatch_${VERSION}_${os}_${arch}"
            if [ "$os" = "windows" ]; then
              zip -q "dist/${name}.zip" "$bin" README.md LICENSE
            else
              tar czf "dist/${name}.tar.gz" "$bin" README.md LICENSE
            fi
            rm -f "$bin"
          done
          (cd dist && sha256sum * > checksums.txt)
          ls -l dist

      - name: create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --title "${GITHUB_REF_NAME}" --generate-notes --verify-tag
