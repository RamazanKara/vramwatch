name: Provider request
description: Ask for a new GPU vendor or inference loader to be supported
labels: [provider]
body:
  - type: dropdown
    id: kind
    attributes:
      label: Kind
      options:
        - GPU vendor (e.g. Intel Arc / Apple Metal)
        - Inference loader (e.g. vLLM / MLX / LM Studio)
    validations:
      required: true
  - type: input
    id: name
    attributes:
      label: What should we support?
      placeholder: "vLLM"
    validations:
      required: true
  - type: textarea
    id: source
    attributes:
      label: How can vramwatch read it?
      description: The command or HTTP endpoint that exposes VRAM / model info, ideally with a sample of its output.
      placeholder: "vLLM exposes /metrics (Prometheus); the field for KV cache usage is ..."
